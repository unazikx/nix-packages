name: Update nix-packages

on:
  schedule:
    - cron: "0 4 * * 1" # every week
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nix-update:
    name: Run nix updater
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Find flake.nix directory
        id: flake-dir
        run: |
          FLAKE_DIR=$(dirname $(find . -name "flake.nix" -not -path "*/node_modules/*" | head -1))
          echo "dir=$FLAKE_DIR" >> $GITHUB_OUTPUT

      - name: Run updater
        working-directory: ${{ steps.flake-dir.outputs.dir }}
        run: nix run .#updater

      - name: Commit changes
        env:
          GIT_AUTHOR_NAME: ${{ vars.GIT_AUTHOR_NAME }}
          GIT_AUTHOR_EMAIL: ${{ vars.GIT_AUTHOR_EMAIL }}
          GIT_COMMITTER_NAME: ${{ vars.GIT_AUTHOR_NAME }}
          GIT_COMMITTER_EMAIL: ${{ vars.GIT_AUTHOR_EMAIL }}
        run: |
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "chore: run nix updater [automated]"
            git push
          else
            echo "No changes from updater"
          fi
